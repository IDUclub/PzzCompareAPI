name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (optional, defaults to timestamp)'
        required: false
        type: string
      skip_migrations:
        description: 'Skip running database migrations'
        required: false
        default: false
        type: boolean

jobs:
  build-and-deploy:
    runs-on: 46_runner
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy keys
        env:
          KEYS_PATH: ${{ secrets.KEYS_PATH }}
        run: |
          if [ -n "$KEYS_PATH" ]; then
            cp "$KEYS_PATH"/* ./ || echo "No keys to copy"
          fi

      - name: Copy env file
        env:
          ENV_PATH: ${{ secrets.ENV_PATH }}
        run: |
          if [ -n "$ENV_PATH" ]; then
            cp "$ENV_PATH/.env.development" ./ || echo "No env file to copy"
          fi

      - name: Generate image tag
        id: vars
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG=$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::8}
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.vars.outputs.tag }} .
          docker push ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}

      - name: Stop old services gracefully
        run: |
          docker compose -f docker-compose.actions.yml stop api worker beat mcp || true
          sleep 10

      - name: Start postgres and redis
        if: inputs.skip_migrations == 'false'
        run: docker compose -f docker-compose.actions.yml up -d postgres redis

      - name: Wait for database
        if: inputs.skip_migrations == 'false'
        run: sleep 5

      - name: Run database migrations
        if: inputs.skip_migrations == 'false'
        run: docker compose -f docker-compose.actions.yml run --rm migrate

      - name: Start all services
        run: docker compose -f docker-compose.actions.yml up -d

      - name: Wait for services initialization
        run: sleep 10

      - name: Health check API
        run: |
          curl --retry 30 --retry-delay 2 --retry-connrefused http://localhost:8300/health
          echo "✅ API is healthy"

      - name: Verify services
        run: |
          echo "Checking service status..."
          docker compose -f docker-compose.actions.yml ps
          RUNNING=$(docker compose -f docker-compose.actions.yml ps --services --filter "status=running" | wc -l)
          TOTAL=6
          echo "Running services: $RUNNING/$TOTAL"
          if [ "$RUNNING" -ne "$TOTAL" ]; then
            echo "❌ Not all services are running!"
            echo "Logs from failed services:"
            docker compose -f docker-compose.actions.yml logs --tail=30
            exit 1
          fi
          echo "✅ All $TOTAL services are running successfully"

      - name: Clean up old images
        run: docker image prune -a --filter "until=168h" -f || true

      - name: Deployment summary
        if: always()
        run: |
          echo "========================================="
          echo "Deployment completed with status: ${{ job.status }}"
          echo "Image: ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}"
          echo "Migrations: ${{ inputs.skip_migrations == 'false' && 'Run' || 'Skipped' }}"
          echo "Timestamp: $(date)"
          echo "========================================="