name: build
on: workflow_dispatch
env:
  IMAGE_NAME: ${{secrets.REGISTRY}}/genbuilder

jobs:
  build:
    runs-on: 46_runner
    outputs:
      now: ${{steps.date.outputs.NOW}}
    steps:
      - name: Set current date as env variable
        id: date
        run: echo "NOW=$(date +'%Y-%m-%dT%H-%M-%S')" >> $GITHUB_OUTPUT
      - name: checkout
        uses: actions/checkout@v4
      - name: copy_keys
        env:
          KEYS_PATH: ${{secrets.KEYS_PATH}}
        run: cp -R "$KEYS_PATH" ./app/
      - name: copy_env
        env:
          ENV_PATH: ${{secrets.ENV_PATH}}
        run: cp "$ENV_PATH"/.env.development ./
      - name: build
        env:
          NOW: ${{steps.date.outputs.now}}
        run: docker build -t "$IMAGE_NAME":"$NOW" .
      - name: push_to_registry
        env:
          NOW: ${{steps.date.outputs.now}}
        run: docker push "$IMAGE_NAME":"$NOW"
  deploy:
    runs-on: 46_runner
    needs: build
    env:
      NOW: ${{needs.build.outputs.now}}
    steps:
      - name: set env
        run: echo "IMAGE=$IMAGE_NAME:$NOW" >> $GITHUB_ENV
      - name: stop_previous
        run: docker compose -f docker-compose.actions.yml down --remove-orphans || true
      - name: run
        run: docker compose -f docker-compose.actions.yml up -d
