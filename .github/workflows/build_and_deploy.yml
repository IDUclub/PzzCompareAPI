name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (optional, defaults to timestamp)'
        required: false
        type: string
      skip_migrations:
        description: 'Skip running database migrations'
        required: false
        default: false
        type: boolean

jobs:
  build-and-deploy:
    runs-on: 46_runner
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      sha_short: ${{ steps.vars.outputs.sha_short }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy keys
        env:
          KEYS_PATH: ${{ secrets.KEYS_PATH }}
        run: |
          if [ -n "$KEYS_PATH" ]; then
            cp "$KEYS_PATH"/* ./ || echo "No keys to copy"
          fi

      - name: Write env file
        env:
          # Preferred: split config across two Actions *variables* (non-sensitive,
          # editable inline in the UI) and one *secret* (credentials only).
          #   Settings -> Secrets and variables -> Actions
          #     Variables tab -> ENV_APP   (app params: thresholds, flags, models, timeouts)
          #     Variables tab -> ENV_URLS  (service addresses: *_URL / *_HOST / *_PORT)
          #     Secrets tab   -> ENV_SECRET (credentials: api keys, tokens, DATABASE_URL)
          # .env.development = ENV_APP + ENV_URLS + ENV_SECRET (concatenated in that
          # order). ENV_SECRET comes last so a credential always wins on any dup.
          ENV_APP: ${{ vars.ENV_APP }}
          ENV_URLS: ${{ vars.ENV_URLS }}
          ENV_SECRET: ${{ secrets.ENV_SECRET }}
          # Legacy fallback: the whole .env.development as one secret (ENV_FILE).
          ENV_FILE: ${{ secrets.ENV_FILE }}
          # Legacy fallback: a .env.development sitting on the runner host.
          ENV_PATH: ${{ secrets.ENV_PATH }}
        run: |
          if [ -n "$ENV_APP" ] || [ -n "$ENV_URLS" ] || [ -n "$ENV_SECRET" ]; then
            : > .env.development
            [ -n "$ENV_APP" ] && printf '%s\n' "$ENV_APP" >> .env.development
            [ -n "$ENV_URLS" ] && printf '%s\n' "$ENV_URLS" >> .env.development
            [ -n "$ENV_SECRET" ] && printf '%s\n' "$ENV_SECRET" >> .env.development
            echo "Wrote .env.development from ENV_APP + ENV_URLS (vars) + ENV_SECRET (secret) ($(wc -l < .env.development) lines)"
          elif [ -n "$ENV_FILE" ]; then
            printf '%s\n' "$ENV_FILE" > .env.development
            echo "Wrote .env.development from ENV_FILE secret ($(wc -l < .env.development) lines)"
          elif [ -n "$ENV_PATH" ]; then
            cp "$ENV_PATH/.env.development" ./ && echo "Copied .env.development from ENV_PATH (fallback)" || echo "No env file to copy"
          else
            echo "::warning::No ENV_APP/ENV_URLS/ENV_SECRET, ENV_FILE or ENV_PATH - .env.development not provided"
          fi

      - name: Generate image tag
        id: vars
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG=$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::8}
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "sha_short=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set image env
        run: |
          echo "IMAGE=${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}" >> $GITHUB_ENV

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.vars.outputs.tag }} \
            -t ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:latest \
            .
          docker push "$IMAGE"
          docker push ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:latest

      - name: Stop old services gracefully
        run: |
          docker compose -f docker-compose.actions.yml down || true
          sleep 10

      - name: Start postgres and redis
        run: docker compose -f docker-compose.actions.yml up -d postgres redis

      - name: Wait for database
        run: sleep 5

      - name: Run database migrations
        if: ${{ !inputs.skip_migrations }}
        run: docker compose -f docker-compose.actions.yml run --rm migrate

      - name: Start app services
        run: docker compose -f docker-compose.actions.yml up -d api worker worker_llm beat mcp

      - name: Wait for services initialization
        run: sleep 10

      - name: Health check API
        run: |
          curl --retry 30 --retry-delay 2 --retry-connrefused http://localhost:8300/health
          echo "✅ API is healthy"

      - name: Verify services
        run: |
          echo "Checking service status..."
          docker compose -f docker-compose.actions.yml ps
          RUNNING=$(docker compose -f docker-compose.actions.yml ps --services --filter "status=running" | wc -l)
          # Long-running services: postgres redis api worker worker_llm beat mcp
          # (migrate is one-shot and exits). Update when adding/removing services.
          TOTAL=7
          echo "Running services: $RUNNING/$TOTAL"
          if [ "$RUNNING" -ne "$TOTAL" ]; then
            echo "❌ Not all services are running!"
            echo "Logs from failed services:"
            docker compose -f docker-compose.actions.yml logs --tail=30
            exit 1
          fi
          echo "✅ All $TOTAL services are running successfully"

      - name: Clean up old images
        run: |
          docker image prune -a --filter "until=168h" -f || true

      - name: Deployment summary
        if: always()
        run: |
          echo "========================================="
          echo "Deployment completed with status: ${{ job.status }}"
          echo "Image: ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}"
          echo "Migrations: ${{ inputs.skip_migrations && 'Skipped' || 'Run' }}"
          echo "Timestamp: $(date)"
          echo "========================================="