# Production deployment compose used by .github/workflows/build_and_deploy.yml.
#
# The workflow builds & pushes ${IMAGE} (= ${IMAGE_NAME}:${NOW}) and then runs
# `docker compose -f docker-compose.actions.yml up -d`. This file brings up the
# full self-contained stack: postgres + redis, a one-shot migrate job, and the
# four app services (api / worker / beat / mcp), all from the single built image.
#
# DB/Redis credentials default to internal-only values (postgres is not exposed
# on the host); override via the runner environment if needed.

x-app-env: &app-env
  APP_ENV: development
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pzz_pipeline}
  REDIS_URL: redis://redis:6379/0
  LOG_LEVEL: INFO
  DB_WAIT_TIMEOUT: "60"
  DB_WAIT_INTERVAL: "2"
  # The dedicated `migrate` service applies Alembic migrations; the api
  # workers must not race to upgrade on every boot.
  RUN_MIGRATIONS_ON_STARTUP: "false"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pzz_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    networks:
      - pzz_compare
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pzz_pipeline}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - pzz_compare
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ${IMAGE}
    env_file: .env.development
    environment:
      <<: *app-env
      IMAGE: ${IMAGE}
    restart: "no"
    networks:
      - pzz_compare
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python service/wait_for_db.py && alembic upgrade head"

  api:
    image: ${IMAGE}
    restart: unless-stopped
    env_file: .env.development
    environment:
      <<: *app-env
      IMAGE: ${IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8300:8000"
    networks:
      - pzz_compare  
    volumes:
      - outputs:/app/outputs
      - task_inputs:/app/task_inputs
    command: uvicorn service.app:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: ${IMAGE}
    restart: unless-stopped
    env_file: .env.development
    environment:
      <<: *app-env
      IMAGE: ${IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - outputs:/app/outputs
      - task_inputs:/app/task_inputs
    # Worker exposes its own Prometheus metrics (task queue_wait / run /
    # fail / retry) — scrape this as a separate target from api:8000/metrics.
    networks:
      - pzz_compare
    ports:
      - "9200:9100"
    # Fast queue: deterministic scenario tasks + beat-scheduled jobs.
    command: >
      celery -A service.tasks.celery_app worker
      -P threads
      --concurrency=${CELERY_CONCURRENCY:-4}
      -Q default
      --loglevel=INFO

  worker_llm:
    image: ${IMAGE}
    restart: unless-stopped
    env_file: .env.development
    environment:
      <<: *app-env
      IMAGE: ${IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - outputs:/app/outputs
      - task_inputs:/app/task_inputs
    networks:
      - pzz_compare
    ports:
      - "9201:9100"
    # GPU-bound queue: LLM upload pipelines. Low concurrency so the embedder /
    # vLLM backends are not oversubscribed.
    command: >
      celery -A service.tasks.celery_app worker
      -P threads
      --concurrency=${CELERY_LLM_CONCURRENCY:-2}
      -Q llm
      --loglevel=INFO

  beat:
    image: ${IMAGE}
    restart: unless-stopped
    env_file: .env.development
    environment:
      <<: *app-env
      IMAGE: ${IMAGE}
    networks:
      - pzz_compare
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A service.tasks.celery_app beat --loglevel=INFO --schedule /tmp/celerybeat-schedule

  mcp:
    image: ${IMAGE}
    restart: unless-stopped
    env_file: .env.development
    environment:
      IMAGE: ${IMAGE}
      APP_ENV: development
      LOG_LEVEL: INFO
      MCP_API_BASE_URL: "http://api:8000"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8765"
      MCP_WORKERS: "1"
    depends_on:
      - api
    ports:
      - "8765:8765"
    networks:
      - pzz_compare
    command: python -m service.mcp_server.main

volumes:
  pgdata:
    driver_opts:
      type: none
      device: /var/essdata/postgres_data
      o: bind
  outputs:
    driver_opts:
      type: none
      device: /var/essdata/PzzCompareData/outputs
      o: bind
  task_inputs:
    driver_opts:
      type: none
      device: /var/essdata/PzzCompareData/task_inputs
      o: bind
networks:
  pzz_compare:
    driver: bridge
