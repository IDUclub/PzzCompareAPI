services:
  postgres_pzz:
    image: postgres:16
    environment:
      POSTGRES_DB: pzz_pipeline
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "6432:5432"
    networks:
      - pzz_compare
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - pzz_compare

  api:
    build: .
    user: root
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_pzz:5432/pzz_pipeline
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      DB_WAIT_TIMEOUT: 60
      DB_WAIT_INTERVAL: 2
      NOT_ALLOWED_LLM_RERANK_NUM_PREDICT: "4000"
      NOT_ALLOWED_LLM_RERANK_THINK: "false"
      NOT_ALLOWED_LLM_RERANK_RECALL_TOP_N: "8"
    depends_on:
      - postgres_pzz
      - redis
    ports:
      - "8300:8000"
    networks:
      - pzz_compare
    command: sh -c "python service/wait_for_db.py && uvicorn service.app:app --host 0.0.0.0 --port 8000"
    volumes:
#      - /PzzCompareData:/app
      - /PzzCompareData/outputs:/app/outputs
      - /PzzCompareData/task_inputs:/app/task_inputs
#      - ./data:/app/data

  worker:
    build: .
    user: root
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_pzz:5432/pzz_pipeline
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      DB_WAIT_TIMEOUT: 60
      DB_WAIT_INTERVAL: 2
      # Rerank output is tiny JSON (~50 tokens) — cap to prevent thinking runaway
      NOT_ALLOWED_LLM_RERANK_NUM_PREDICT: "4000"
      NOT_ALLOWED_LLM_RERANK_THINK: "false"
      # Fewer candidates → shorter prompt → less room for thinking runaway
      NOT_ALLOWED_LLM_RERANK_RECALL_TOP_N: "8"
    depends_on:
      - postgres_pzz
      - redis
    ports:
      - "9200:9100"
    networks:
      - pzz_compare
    # Fast queue: deterministic scenario tasks + beat-scheduled jobs.
    command: sh -c "python service/wait_for_db.py && celery -A service.tasks.celery_app worker -P threads --concurrency=4 -Q default --loglevel=INFO"
    volumes:
#      - /PzzCompareData:/app
      - /PzzCompareData/outputs:/app/outputs
      - /PzzCompareData/task_inputs:/app/task_inputs
#      - ./data:/app/data

  worker_llm:
    build: .
    user: root
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_pzz:5432/pzz_pipeline
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      DB_WAIT_TIMEOUT: 60
      DB_WAIT_INTERVAL: 2
      NOT_ALLOWED_LLM_RERANK_NUM_PREDICT: "4000"
      NOT_ALLOWED_LLM_RERANK_THINK: "false"
      NOT_ALLOWED_LLM_RERANK_RECALL_TOP_N: "8"
    depends_on:
      - postgres_pzz
      - redis
    ports:
      - "9201:9100"
    networks:
      - pzz_compare
    # GPU-bound queue: LLM upload pipelines. Low concurrency so the embedder /
    # vLLM backends are not oversubscribed.
    command: sh -c "python service/wait_for_db.py && celery -A service.tasks.celery_app worker -P threads --concurrency=2 -Q llm --loglevel=INFO"
    volumes:
#      - /PzzCompareData:/app
      - /PzzCompareData/outputs:/app/outputs
      - /PzzCompareData/task_inputs:/app/task_inputs
#      - ./data:/app/data

  beat:
    build: .
    user: root
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres_pzz:5432/pzz_pipeline
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      DB_WAIT_TIMEOUT: 60
      DB_WAIT_INTERVAL: 2
    depends_on:
      - postgres_pzz
      - redis
    networks:
      - pzz_compare
    command: sh -c "python service/wait_for_db.py && celery -A service.tasks.celery_app beat --loglevel=INFO"
    volumes:
#      - /PzzCompareData:/app
      - /PzzCompareData/outputs:/app/outputs
      - /PzzCompareData/task_inputs:/app/task_inputs
#      - ./data:/app/data

  mcp:
    build: .
    user: root
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      # MCP-only settings — see service/mcp_server/config.py
      MCP_API_BASE_URL: "http://api:8000"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8765"
      MCP_WORKERS: "1"
    depends_on:
      - api
    ports:
      - "8765:8765"
    networks:
      - pzz_compare
    command: sh -c "python -m service.mcp_server.main"
#    volumes:
#      - /PzzCompareData:/app

volumes:
  pgdata:
    driver_opts:
      type: none
      device: /var/essdata/postgres_data
      o: bind
networks:
  pzz_compare:
    driver: bridge
